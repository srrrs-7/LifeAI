      <rect x="8" y="8" width="10" height="20" rx="5" fill="#00C853" />
      <text x="26" y="14" font-size="11" font-weight="800" fill="#00C853">P3</text>
      <text x="52" y="24" font-size="14" font-weight="600" fill="#0a0a1a">次の資格の学習計画を策定</text>
