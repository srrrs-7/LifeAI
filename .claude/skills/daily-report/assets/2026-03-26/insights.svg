    <rect x="12" y="60" width="16" height="16" rx="4" fill="url(#accentGrad)"/>
    <text x="38" y="74" font-size="14" font-weight="600" fill="#0a0a1a">AI活用PRレビューの実践と精度検証</text>

    <!-- Activity 3 -->
    <rect x="0" y="96" width="520" height="40" rx="10" fill="#EDE7F6"/>
    <rect x="12" y="108" width="16" height="16" rx="4" fill="url(#accentGrad)"/>
    <text x="38" y="122" font-size="14" font-weight="600" fill="#0a0a1a">BDD E2Eテスト導入の検討</text>
  </g>

