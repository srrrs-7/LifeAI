  <circle cx="1100" cy="812" r="60" fill="#7C4DFF" opacity="0.12"/>
  <circle cx="1060" cy="852" r="40" fill="#536DFE" opacity="0.08"/>
  <text x="56" y="810" font-size="11" font-weight="800" fill="rgba(255,255,255,0.5)" letter-spacing="2.5">TODAY'S KEY THEME</text>
  <text x="56" y="840" font-size="22" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">AI協働時代の品質保証とデータ戦略</text>
  <text x="56" y="868" font-size="13" font-weight="400" fill="rgba(255,255,255,0.6)">AIがレビューする時代に、人間は何を保証するのか。データ集約が次の競争力になる。</text>

