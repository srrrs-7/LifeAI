  <rect x="24" y="124" width="564" height="4" rx="2" fill="url(#accentGrad)"/>
  <text x="48" y="160" font-size="11" font-weight="800" fill="#536DFE" letter-spacing="1.5">ACTIVITIES</text>
  <text x="48" y="182" font-size="18" font-weight="800" fill="#0a0a1a" letter-spacing="-0.3">実施事項</text>
  <text x="564" y="182" text-anchor="end" font-size="12" font-weight="600" fill="#536DFE">x3</text>

  <g transform="translate(48, 200)">
    <!-- Activity 1 -->
    <rect x="0" y="0" width="520" height="40" rx="10" fill="#EDE7F6"/>
    <rect x="12" y="12" width="16" height="16" rx="4" fill="url(#accentGrad)"/>
    <text x="38" y="26" font-size="14" font-weight="600" fill="#0a0a1a">AWS ANS 受験・ネットワーク基盤の深層理解</text>

    <!-- Activity 2 -->
