      <rect x="8" y="8" width="10" height="20" rx="5" fill="#FF1744"/>
      <text x="26" y="14" font-size="11" font-weight="800" fill="#FF1744">P1</text>
      <text x="52" y="24" font-size="14" font-weight="600" fill="#0a0a1a">AWS資格(ANS・MLS)を3月中にやり切る</text>
    </g>

    <!-- P2 -->
