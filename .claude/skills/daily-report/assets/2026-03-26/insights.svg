  <circle cx="1100" cy="20" r="120" fill="#536DFE" opacity="0.07"/>
  <circle cx="1140" cy="80" r="70" fill="#7C4DFF" opacity="0.05"/>
  <circle cx="50" cy="80" r="40" fill="#00E5FF" opacity="0.04"/>

