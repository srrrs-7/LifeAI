  <text x="636" y="568" font-size="11" font-weight="800" fill="#00C853" letter-spacing="1.5">NEXT STEPS</text>
  <text x="636" y="590" font-size="18" font-weight="800" fill="#0a0a1a" letter-spacing="-0.3">次の一手</text>

