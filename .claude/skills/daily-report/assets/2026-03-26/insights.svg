  <rect x="612" y="124" width="564" height="4" rx="2" fill="url(#sunGrad)"/>
  <text x="636" y="160" font-size="11" font-weight="800" fill="#FF6D00" letter-spacing="1.5">INSIGHTS</text>
  <text x="636" y="182" font-size="18" font-weight="800" fill="#0a0a1a" letter-spacing="-0.3">気づき・学び</text>
  <text x="1152" y="182" text-anchor="end" font-size="12" font-weight="600" fill="#FF6D00">x3</text>

