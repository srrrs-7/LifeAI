    <text x="132" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">AWS</text>
    <rect x="176" y="0" width="72" height="24" rx="12" fill="url(#sunGrad)"/>
    <text x="212" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Claude</text>
    <rect x="256" y="0" width="72" height="24" rx="12" fill="url(#tealGrad)"/>
    <text x="292" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Azure</text>
